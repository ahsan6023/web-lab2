<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Grid Photo Gallery</title>

    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/grid.css">
</head>
<body>

<h1>Task 6: CSS Grid Photo Gallery</h1>

<div class="gallery">

    <div class="photo">
        <img src="https://via.placeholder.com/400x300" alt="">
        <div class="overlay">Photo 1</div>
    </div>

    <div class="photo tall">
        <img src="https://via.placeholder.com/400x500" alt="">
        <div class="overlay">Photo 2</div>
    </div>

    <div class="photo">
        <img src="https://via.placeholder.com/400x300" alt="">
        <div class="overlay">Photo 3</div>
    </div>

    <div class="photo wide">
        <img src="https://via.placeholder.com/600x300" alt="">
        <div class="overlay">Photo 4</div>
    </div>

    <div class="photo">
        <img src="https://via.placeholder.com/400x300" alt="">
        <div class="overlay">Photo 5</div>
    </div>

    <div class="photo tall">
        <img src="https://via.placeholder.com/400x500" alt="">
        <div class="overlay">Photo 6</div>
    </div>

</div>

</body>
</html>
