<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Display Properties</title>

    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/display.css">
</head>
<body>

<h1>Task 1: Display Property Showcase</h1>

<section>
    <h2>Block vs Inline vs Inline-Block</h2>

    <div class="block box">Block Element</div>

    <span class="inline box">Inline 1</span>
    <span class="inline box">Inline 2</span>

    <div class="inline-block box">Inline-Block 1</div>
    <div class="inline-block box">Inline-Block 2</div>
</section>

<section>
    <h2>Table Layout Without Table</h2>

    <div class="table">
        <div class="row">
            <div class="cell">Name</div>
            <div class="cell">Age</div>
        </div>
        <div class="row">
            <div class="cell">Ahsan</div>
            <div class="cell">21</div>
        </div>
    </div>
</section>

<section>
    <h2>Hidden Elements</h2>
    <div class="hidden-box">Hidden on Mobile</div>
</section>

</body>
</html>
