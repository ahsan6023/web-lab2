<!DOCTYPE html>
<html>
<head>
  <title>Task 7 – Holy Grail Layout</title>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/responsive.css">
</head>
<body>

<h1>Holy Grail Layout Comparison</h1>

<!-- FLOAT -->
<section class="float-layout clearfix">
  <header>Header</header>
  <aside class="left">Left</aside>
  <main>Content</main>
  <aside class="right">Right</aside>
  <footer>Footer</footer>
</section>

<!-- FLEXBOX -->
<section class="flex-layout">
  <header>Header</header>
  <div class="flex-body">
    <aside>Left</aside>
    <main>Content</main>
    <aside>Right</aside>
  </div>
  <footer>Footer</footer>
</section>

<!-- GRID -->
<section class="grid-layout">
  <header>Header</header>
  <aside>Left</aside>
  <main>Content</main>
  <aside>Right</aside>
  <footer>Footer</footer>
</section>

</body>
</html>
