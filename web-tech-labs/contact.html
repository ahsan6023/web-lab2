<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:0; }
        header { background-color:#004080; color:white; padding:20px; text-align:center; }
        nav { background-color:#222; padding:10px; text-align:center; }
        nav a { color:white; margin:10px; text-decoration:none; font-weight:bold; }
        nav a:hover { text-decoration:underline; }
        nav a.active { text-decoration:underline; color:yellow; }
        section { padding:20px; }
        form { width:400px; margin:auto; border:1px solid #000; padding:20px; }
        label { font-weight:bold; }
        input, textarea { width:100%; padding:10px; margin:5px 0; }
        button { padding:10px 20px; background-color:#004080; color:white; border:none; cursor:pointer; }
        button:hover { background-color:#0066cc; }
        footer { background-color:#004080; color:white; text-align:center; padding:10px; margin-top:20px; }
        .success { color:green; }
        .error { color:red; }
    </style>
</head>
<body>

<header>
    <h1>Ahsan Siddiqui</h1>
    <p>BS Computer Science | Web Technologies Lab</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="profile.html">Profile</a>
    <a href="schedule.html">Schedule</a>
    <a href="navigation.html">Navigation</a>
    <a href="registration.html">Registration</a>
    <a href="contact.html" class="active">Contact</a>
    <a href="https://github.com" target="_blank">GitHub</a>
</nav>

<section>
    <h2>Contact Me</h2>
    <!-- Formspree Form -->
    <form id="contactForm" action="https://formspree.io/f/xojnrbpn" method="POST">
        <label for="name">Full Name:</label>
        <input type="text" name="name" id="name" required>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" required>

        <label for="message">Message:</label>
        <textarea name="message" id="message" rows="5" required></textarea>

        <button type="submit">Send</button>

        <p class="success" id="successMessage" style="display:none;">Your message has been sent!</p>
        <p class="error" id="errorMessage" style="display:none;">Oops! Something went wrong.</p>
    </form>
</section>

<p><a href="index.html">Back to Home</a></p>

<footer>
    <p>© 2026 Ahsan Siddiqui | UET Peshawar</p>
</footer>

<script>
    const form = document.getElementById('contactForm');
    const successMsg = document.getElementById('successMessage');
    const errorMsg = document.getElementById('errorMessage');

    form.addEventListener('submit', async function(event) {
        event.preventDefault();
        const formData = new FormData(form);
        const response = await fetch(form.action, {
            method: form.method,
            body: formData,
            headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
            form.reset();
        } else {
            successMsg.style.display = 'none';
            errorMsg.style.display = 'block';
        }
    });
</script>

</body>
</html>
