<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Ahsan Siddiqui</h1>
    <p>BS Computer Science | Web Technologies Lab</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="profile.html">Profile</a>

    <a href="registration.html">Registration</a>
    <a href="contact.html" class="active">Contact</a>
    <a href="https://github.com" target="_blank">GitHub</a>
</nav>

<section>
    <h2>Contact Me</h2>
    <!-- Formspree Form -->
    <form id="contactForm" action="https://formspree.io/f/xojnrbpn" method="POST">
        <label for="name">Full Name:</label>
        <input type="text" name="name" id="name" required>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" required>

        <label for="message">Message:</label>
        <textarea name="message" id="message" rows="5" required></textarea>

        <button type="submit">Send</button>

        <p class="success" id="successMessage" style="display:none;">Your message has been sent!</p>
        <p class="error" id="errorMessage" style="display:none;">Oops! Something went wrong.</p>
    </form>
</section>

<p><a href="index.html">Back to Home</a></p>

<footer>
    <p>© 2026 Ahsan Siddiqui | UET Peshawar</p>
</footer>

<script>
    const form = document.getElementById('contactForm');
    const successMsg = document.getElementById('successMessage');
    const errorMsg = document.getElementById('errorMessage');

    form.addEventListener('submit', async function(event) {
        event.preventDefault();
        const formData = new FormData(form);
        const response = await fetch(form.action, {
            method: form.method,
            body: formData,
            headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
            form.reset();
        } else {
            successMsg.style.display = 'none';
            errorMsg.style.display = 'block';
        }
    });
</script>

</body>
</html>
